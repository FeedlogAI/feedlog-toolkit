# Release pipeline: Changesets + npm Trusted Publishing (OIDC) only — no NPM_TOKEN.
# Mirrors main CI gates (format, lint, test, build, verify:pack, e2e) before version/publish steps.
# Trusted publisher on npmjs.com must list workflow filename: changesets.yml
#
# Requirements: npm CLI >= 11.5.1, Node >= 22.14 (see https://docs.npmjs.com/trusted-publishers/)

name: Changesets

on:
  push:
    branches:
      - main
    paths:
      - '.changeset/**'
      - '.github/workflows/changesets.yml'
      - 'packages/**'
      - 'examples/**'
      - 'package.json'
      - 'package-lock.json'

permissions:
  id-token: write # OIDC for npm trusted publishing (required)
  contents: write # changesets/action: commits / PRs
  pull-requests: write

jobs:
  changesets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22.x'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      # OIDC trusted publishing requires npm >= 11.5.1 (npm docs).
      # Bypass potentially broken bundled npm by bootstrapping from tarball.
      - name: Use npm CLI compatible with OIDC publish
        run: |
          curl -fsSL https://registry.npmjs.org/npm/-/npm-11.5.1.tgz | tar xz -C /tmp
          node /tmp/package/bin/npm-cli.js install -g npm@^11.5.1
          rm -rf /tmp/package
          npm --version

      - name: Install dependencies
        run: npm ci

      # --- Same gates as .github/workflows/ci.yml (before Changesets) ---
      - name: Check formatting
        run: npm run format:check

      - name: Run linting
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build packages
        run: npm run build

      - name: Verify publishable package contents
        run: npm run verify:pack

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run e2e

      # commitMode: github-api still calls GraphQL updateRef(force: true) when changeset-release/main
      # exists but is not at the workflow base SHA (same as resetting before a version commit). Repo
      # rules that block force-pushes reject that. Deleting the stale ref when no open release PR
      # exists makes ghcommit use createRef instead (no force). If a release PR is open and main
      # has moved, merge/close it first or add a ruleset bypass for github-actions[bot].
      - name: Delete stale changeset-release branch if no open version PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          repo="${{ github.repository }}"
          head="${{ github.repository_owner }}:changeset-release/main"
          open_count=$(gh pr list --repo "$repo" --head "$head" --base main --state open --json number --jq 'length')
          if [ "$open_count" -eq 0 ]; then
            if gh api "repos/$repo/git/refs/heads/changeset-release/main" --silent >/dev/null 2>&1; then
              gh api "repos/$repo/git/refs/heads/changeset-release/main" -X DELETE
              echo "Deleted stale changeset-release/main (no open release PR)."
            fi
          else
            echo "Open release PR exists; not deleting changeset-release/main."
          fi

      # --- Changesets: version PR and/or publish (auth = OIDC only) ---
      - name: Create Version Packages PR / publish
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          # Still need delete-stale-branch step above: github-api uses forced ref updates when the branch diverged.
          commitMode: github-api
          version: npm run version-packages
          commit: 'ci: release packages'
          title: 'ci: release packages'
          publish: npm run publish-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
